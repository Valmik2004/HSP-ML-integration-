<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HydroSense Predict</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body class="font-inter bg-gray-100 text-gray-800 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-4xl font-extrabold text-center text-blue-700 mb-8">Register</h2>
        <form id="registerForm" class="space-y-6">
            <div>
                <label for="username" class="block text-lg font-semibold text-gray-700 mb-2">Username</label>
                <input type="text" id="username" name="username" class="w-full px-5 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200" required>
            </div>
            <div>
                <label for="password" class="block text-lg font-semibold text-gray-700 mb-2">Password</label>
                <input type="password" id="password" name="password" class="w-full px-5 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white text-lg font-bold py-3 rounded-lg shadow-md hover:bg-blue-700 transition duration-300 transform hover:scale-105">Register</button>
        </form>
        <div id="message" class="mt-6 text-center text-lg font-medium"></div>
        <p class="mt-6 text-center text-gray-600">
            Already have an account? <a href="/login" class="text-green-600 hover:underline">Login here</a>
        </p>
    </div>

    <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
